  v.innerHTML='<div class="card"><h3>How this tool works — a Data 360 project, end to end</h3><p class="sub">You are designing the implementation here first, then deploying to the real org via the runbook. Everything follows the Salesforce-taught sequence: connect → map → unify → insights → segment → activate.</p>'
   +HOWTO_STEPS.map(s=>'<div class="howstep"><b>'+esc(s[0])+'</b><br><span>'+s[1]+'</span></div>').join('')+'</div>'
   +'<div class="card"><h3>Grounding library</h3><p class="sub">Everything the tool and its chat "know": the official Data 360 Developer Guide digest, the Deep Dive playlist reference, and the 12-day bootcamp transcript digests. Current size: '+gInfo+'.</p>'
   +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'
   +'<button class="btn" onclick="navigator.clipboard.writeText('+JSON.stringify(refreshPrompt).replace(/"/g,'&quot;')+');status(\'Refresh prompt copied — paste into the main Claude chat\')">📋 Copy grounding-refresh prompt</button>'
   +'<span class="sub" style="align-self:center">Run it in the main chat after every Salesforce release (Spring / Summer / Winter) — Claude re-verifies against live docs.</span></div>'
   +'<h3 style="margin-top:6px">＋ Add new knowledge</h3><p class="sub">Drop transcripts, release notes, help articles, or client-specific standards (.md / .txt). They are appended to the grounding document and the chat uses them immediately.</p>'
   +'<div id="kDrop" class="kdrop">Drop a .md / .txt file here — or paste below</div>'
   +'<input type="file" id="kFile" accept=".md,.txt,text/plain,text/markdown" style="display:none">'
   +'<textarea id="kPaste" rows="4" placeholder="…or paste content here" style="width:100%;margin-top:8px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font:inherit"></textarea>'
   +'<div class="row" style="margin-top:8px"><input type="text" id="kName" placeholder="Name this knowledge (e.g. Winter ’27 release notes)" style="flex:1"><button class="btn primary" id="kAdd">Add to grounding</button></div>'
   +'<p id="kMsg" class="sub" role="status"></p></div>';
  const drop=$('kDrop');
  drop.onclick=()=>$('kFile').click();
  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
  const readFile=f=>new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(rd.result);rd.onerror=rej;rd.readAsText(f);});
  let pending=null;
  const takeFile=async f=>{
    if(!f)return;
    if(f.size>3*1024*1024){$('kMsg').textContent='File > 3 MB — split it or paste the relevant part.';return;}
    pending=await readFile(f);
    if(!$('kName').value)$('kName').value=f.name.replace(/\.(md|txt)$/i,'');
    drop.textContent='Ready: '+f.name+' ('+(f.size/1024).toFixed(0)+' KB) — click "Add to grounding"';
  };
  drop.addEventListener('drop',e=>takeFile(e.dataTransfer.files[0]));
  $('kFile').onchange=e=>takeFile(e.target.files[0]);
  $('kAdd').onclick=async()=>{
    const text=pending||$('kPaste').value.trim();
    const name=$('kName').value.trim()||'Untitled knowledge';
    if(!text){$('kMsg').textContent='Nothing to add — drop a file or paste content.';return;}
    $('kAdd').disabled=true;$('kMsg').textContent='Adding…';
    try{
      await appendKnowledge(name,text);
      $('kMsg').textContent='✓ Added to grounding ('+Math.round(text.length/1024)+' KB). The chat knows it now; skill reference copy synced.';
      pending=null;$('kPaste').value='';$('kName').value='';drop.textContent='Drop a .md / .txt file here — or paste below';
      renderHowTo();
    }catch(e){$('kMsg').textContent='Failed: '+e.message;}
    $('kAdd').disabled=false;
  };
}

function iconKeyOf(name){

  const map=[['shopify','shopify'],['klaviyo',null],['zendesk','zendesk'],['snowflake','snowflake'],['databricks','databricks'],
   ['bigquery','googlecloud'],['google cloud','googlecloud'],['gcs','googlecloud'],['google ads','googleads'],['customer match','googleads'],

   ['stripe','stripe'],['mailchimp','mailchimp'],['hubspot','hubspot'],['tiktok','tiktok']];
  for(const [k,v] of map)if(n.includes(k))return v;

}
function svgLogo(name,x,y,size){
  const b=brandOf(name);

  const ic=key&&BRAND_ICONS[key];
  if(ic){
    const pad=size*0.18, gs=(size-2*pad)/24;
    return '<rect x="'+x+'" y="'+y+'" width="'+size+'" height="'+size+'" rx="'+(size*0.22)+'" fill="'+(ic.h==='#FFFFFF'?b.col:ic.h)+'"/>'

  return '<rect x="'+x+'" y="'+y+'" width="'+size+'" height="'+size+'" rx="'+(size*0.22)+'" fill="'+b.col+'"/>'

function cadenceColor(f){
  f=String(f||'').toLowerCase();
  if(/stream|real/.test(f))return '#386AFF';
  if(/hour|rapid/.test(f))return '#1B7A3E';
  if(/daily|12|24/.test(f))return '#B58A00';
  return '#7A7A7A';
}

function buildWriteupBiz(rows){
  if(!rows.length)return 'No source systems registered yet — use “＋ Connect a system”.';
  const objs=objectives().split('\n').filter(Boolean);
  const purpose=r=>{
    const e=(r[1]||'').toLowerCase();
    if(/customer|profile|subscriber|member/.test(e)&&/order|transaction|purchase/.test(e))return 'the commercial backbone — who the customers are and what they buy';
    if(/order|transaction|purchase|pos|sales/.test(e))return 'the transaction history that powers recency/frequency/value logic';
    if(/customer|profile|subscriber|contact|member/.test(e))return 'the customer master that anchors identity';
    if(/engagement|email|event|click|open/.test(e))return 'the behavioral signal — who is actually paying attention';
    if(/ticket|case|support|satisfaction/.test(e))return 'the service reality — who is unhappy right now (suppression and care)';
    if(/loyalty|points|tier/.test(e))return 'the loyalty relationship — tiers, points, and the strongest matching key';
    if(/product|catalog|inventory/.test(e))return 'the catalog reference the transactions resolve against';
    return 'operational data supporting the customer view';
  };
  const cadWhy=f=>{f=String(f||'').toLowerCase();
    if(/stream|real/.test(f))return 'streams in near-real-time (justified only by an in-the-moment use case — highest credit multiplier)';
    if(/hour/.test(f))return 'refreshes hourly so daily decisioning is never stale';
    if(/daily/.test(f))return 'lands daily — the cost-efficient default for batch decisioning';
    if(/week|month/.test(f))return 'refreshes on a slower cycle, appropriate for reference data';
    return 'has its refresh cadence still to be confirmed';
  };
  let w='**Why this architecture.** '+(objs.length?('The design exists to serve '+objs.length+' business objective'+(objs.length>1?'s':'')+': '+objs.map(o=>'*'+o.toLowerCase()+'*').join('; ')+'. Every source below earns its place by feeding at least one of them.'):'Business objectives are not yet captured — add them above; they are the justification for every source and every credit spent.')+'\n\n';
  rows.forEach(r=>{
    w+='- **'+r[0]+'** contributes '+purpose(r)+'. It connects via '+methodShort(r[2])+' and '+cadWhy(r[3])+'.\n';
  });
  w+='\nEach source lands in its own data stream and Data Lake Object (original schema), is harmonized onto the C360 standard model, and resolves into the **Unified Individual** — the single customer the segments and activations act on. Per Salesforce usage best practice, only decision-relevant records and attributes are ingested, and aggregation happens before ingestion where row-level detail adds no value.';
  return w;
}

let VOLS={};
function parseVolumes(){
  VOLS={};
  const sec=(STATEC.split(/##\s+Volumes/i)[1]||'').split(/\n##\s+/)[0];
  [...sec.matchAll(/^\|([^|\n]+)\|([^|\n]*)\|([^|\n]*)\|/gm)].forEach(m=>{
    const s=m[1].trim();if(!s||s==='Source'||/^-+$/.test(s.replace(/\s/g,'')))return;

    const mm=parseFloat(String(m[3]).replace(/[^0-9.]/g,''));
    if(mm)CRED.rowsBySrc[s]=Math.max(mm/1e6,0.01);
  });
}

function entAutofill(extracted){
  const found={};
  const num=s=>parseFloat(String(s).replace(/[,\s]/g,''));
  let m=extracted.match(/(?:data services|dc)\s*credits?[^\d]{0,40}([\d,]{4,})/i)||extracted.match(/([\d,]{6,})\s*(?:data services\s*)?credits/i);
  if(m)found.dsc=num(m[1]);
  m=extracted.match(/sandbox[^\d]{0,40}([\d,]{4,})/i);if(m)found.sand=num(m[1]);
  m=extracted.match(/storage[^\d]{0,40}([\d.,]+)\s*TB/i);if(m)found.storage=num(m[1]);
  const dates=[...extracted.matchAll(/(\d{4}-\d{2}-\d{2})|(\d{1,2}\/\d{1,2}\/\d{4})/g)].map(x=>x[0]);
  if(dates.length){found.start=dates[0];if(dates.length>1)found.end=dates[dates.length-1];}
  let applied=0;
  Object.entries(found).forEach(([k,v])=>{const el=$('ef_'+k);if(el&&!el.value.trim()){el.value=v;applied++;}});
  return applied;
}

      html=cov+rules+await renderMappingPanel();

function parseMappingRows(content){
  const lines=content.split('\n');
  const rows=[];let cols=null;
  for(const L of lines){
    if(/^\s*\|/.test(L)){
      const cells=L.split('|').slice(1,-1).map(c=>c.trim());
      if(!cols){
        const low=cells.map(c=>c.toLowerCase());
        if(low.some(c=>c.includes('source field')))cols=low;
        continue;
      }
      if(cells.every(c=>/^[-\s:]*$/.test(c)))continue;
      const get=n=>{const i=cols.findIndex(c=>c.includes(n));return i>=0?(cells[i]||'').replace(/`/g,''):'';};
      const src=get('source field'),dmo=get('target dmo');
      if(src&&dmo&&!dmo.startsWith('—'))rows.push({src,dmo,dmof:get('dmo field'),transform:get('transform'),type:get('data type')||get('type'),dlof:get('dlo field')});
    }else if(cols&&L.trim()==='')break;
  }
  return rows;
}
function mappingGraph(rows){
  const idOf=s=>s.replace(/[^A-Za-z0-9]/g,'_');
  let g='flowchart LR\n';
  const seenS=new Set(),edges=new Set();
  rows.forEach(r=>{const id='s_'+idOf(r.src);
    if(!seenS.has(id)){g+=`  ${id}["${r.src.replace(/"/g,'')}"]:::sf\n`;seenS.add(id);}});
  const dmos={};rows.forEach(r=>{(dmos[r.dmo]=dmos[r.dmo]||[]).push(r);});
  Object.entries(dmos).forEach(([dmo,rs],i)=>{
    g+=`  subgraph D${i}["${dmo.replace(/"/g,'')}"]\n`;
    const seenF=new Set();
    rs.forEach(r=>{const f=r.dmof||'(field tbd)';const fid='d'+i+'_'+idOf(f);
      if(!seenF.has(fid)){g+=`    ${fid}("${f.replace(/"/g,'')}"):::df\n`;seenF.add(fid);}});
    g+='  end\n';
  });
  Object.entries(dmos).forEach(([dmo,rs],i)=>{
    rs.forEach(r=>{const f=r.dmof||'(field tbd)';
      const e='s_'+idOf(r.src)+'-->d'+i+'_'+idOf(f);
      if(!edges.has(e)){g+='  '+e+'\n';edges.add(e);}});
  });
  g+='  classDef sf fill:#e9f0ff,stroke:#386AFF,color:#101725\n  classDef df fill:#fff,stroke:#94a3b8,color:#101725\n';
  return g;
}

async function mapUpload(files){
  if(!proj)return;
  for(const f of files){
    if(f.size>50*1024*1024){$('mapUpMsg').textContent=f.name+' > 50 MB — copy manually';continue;}
    $('mapUpMsg').textContent='Uploading '+f.name+'…';
    const dest=proj+'/'+mapDir()+'/'+safeName(f.name);
    const r=await fetch(API+'/api/upload?path='+encodeURIComponent(dest),{method:'POST',body:f});
    const j=await r.json();
    if(j.error){$('mapUpMsg').textContent='Upload failed: '+j.error;return;}
  }
  $('mapUpMsg').textContent='✓ Uploaded — click Auto-map to draft the field mapping, and record expected volumes on the system sub-tab (feeds the credit estimate).';
  await refreshMapFiles();
}
function wireMapImport(scope){
  const drop=scope.querySelector('#mapDrop');if(!drop)return;
  const fin=scope.querySelector('#mapFileIn');
  drop.onclick=()=>fin.click();

async function renderMappingPanel(){
  const raw=await readFirst(['02-mappings/*.md']);

  const docs=Object.entries(fsD);cache.mappingDocs=fsD;

  if(obj)html+='<div class="card" style="border-left:3px solid var(--blue)"><h3>Mapping toward</h3><p class="sub" style="margin:0">'+esc(obj.split('\n').join(' · '))+'</p></div>';
  if(!docs.length)return html+'<div class="empty">No mapping docs yet — import a CSV above and click Auto-map.</div>';
  const pretty=n=>n.replace(/-(mapping|profile)\.md$/i,'').replace(/\.md$/i,'').replace(/[-_]/g,' ').replace(/\b\w/g,ch=>ch.toUpperCase());
  const srcNames=distinctSystems().map(r=>r[0]);
  let maps=docs.filter(([n])=>!/-profile\.md$/i.test(n));
  let profs=docs.filter(([n])=>/-profile\.md$/i.test(n));
  // system sub-tabs
  const sysOf=n=>guessSource(n,srcNames);

  window.mapSel=window.mapSel&&(window.mapSel==='all'||sysSet.includes(window.mapSel))?window.mapSel:'all';
  html='<div class="subnav" id="mapSubnav"><button data-m="all"'+(window.mapSel==='all'?' class="on"':'')+'>All systems</button>'
    +sysSet.map(s=>'<button data-m="'+esc(s)+'"'+(window.mapSel===s?' class="on"':'')+'><span class="dot '+(maps.some(([n])=>sysOf(n)===s)?'confirmed':'')+'"></span>'+esc(s)+'</button>').join('')+'</div>'+html;
  if(window.mapSel!=='all'){
    maps=maps.filter(([n])=>sysOf(n)===window.mapSel);
    profs=profs.filter(([n])=>sysOf(n)===window.mapSel);
    html+=volumePromptHtml(window.mapSel);
  }
  if(maps.length)html+='<div class="sect">Your mappings</div>';
  for(const [n,c] of maps){
    const rows=parseMappingRows(c);
    const dlo=(c.match(/\*\*Proposed DLO\*\*:\s*`([^`]+)`/i)||[])[1];
    const cat=(c.match(/category\s+\*\*([A-Za-z]+)\*\*/i)||[])[1];
    const pk=(c.match(/primary key\s+`([^`]+)`/i)||[])[1];
    const et=(c.match(/event time\s+`([^`]+)`/i)||[])[1];
    const isDraft=/auto-generated draft/i.test(c);
    const chips=[
      dlo?`<span class="mchip">DLO <b>${esc(dlo)}</b></span>`:'',
      cat?`<span class="cat ${esc(cat)}">${esc(cat)}</span>`:'',
      pk?`<span class="mchip">PK <b>${esc(pk)}</b></span>`:'',
      et?`<span class="mchip">event time <b>${esc(et)}</b></span>`:'',
      rows.length?`<span class="mchip"><b>${rows.length}</b> field mappings</span>`:'',
      isDraft?'<span class="chip proposed">auto-draft — review</span>':''
    ].filter(Boolean).join('');
    html+='<div class="card mapcard'+(rows.length?'':' docmode')+'">'
        +`<h3>${esc(pretty(n))}</h3>`
        +(chips?'<div class="metachips">'+chips+'</div>':'')
        +(rows.length
          ?'<div class="tools"><button class="vd on">Field flow</button><button class="vt">Document</button><button class="ve">✎ Edit</button></div>'
           +'<div class="diagram">'+fieldFlowSVG(rows,{dlo:dlo,pk:pk,srcLabel:pretty(n)})+'</div>'
          :'<p class="sub">No mapping table found in this doc.</p>')
        +'<div class="viewdoc md">'+md(c)+'</div>'
        +(rows.length?'<div class="vieweditor" style="display:none" data-fname="'+esc(n)+'">'+mappingEditHtml(n,rows)+'</div>':'')
        +'</div>';
  }
  if(profs.length)html+='<div class="sect">Profiling output</div>';
  for(const [n,c] of profs){
    html+=`<details class="profcard"><summary>${esc(pretty(n))} — column profile</summary><div class="md">${md(c)}</div></details>`;
  }
  return html;
}
function wireMapCards(scope){
  wireFieldFlow(scope);

  scope.querySelectorAll('.mapcard').forEach(card=>{

    if(!vd)return;
    const ed=card.querySelector('.vieweditor'),dg=card.querySelector('.diagram');
    const show=mode=>{
      card.classList.toggle('docmode',mode==='doc');
      if(dg)dg.style.display=mode==='dg'?'':'none';
      if(ed)ed.style.display=mode==='ed'?'':'none';
      vd.classList.toggle('on',mode==='dg');vt.classList.toggle('on',mode==='doc');if(ve)ve.classList.toggle('on',mode==='ed');
    };
    vd.onclick=()=>show('dg');vt.onclick=()=>show('doc');

      const fname=ed.dataset.fname;

          const orig=parseMappingRows((cache.mappingDocs||{})[fname]||'')[+tr.dataset.i]||{};

          return dmo==='__drop'?null:Object.assign({},orig,{dmo,dmof:tr.querySelector('.me-f').value.trim(),transform:tr.querySelector('.me-t').value.trim()||'—'});
        }).filter(Boolean);
        const msg=ed.querySelector('.me-msg');msg.textContent='Saving…';
        try{await saveMappingEdit(fname,rows);msg.textContent='✓ Saved — rebuilding views…';CANVAS_MODEL=null;delete cache.mapping;loadTab('mapping',true);}
        catch(e){msg.textContent='Failed: '+e.message;}
      };
    }
  });
}
